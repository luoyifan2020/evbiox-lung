seed: 2025
out_dir: "${PROJECT_ROOT}/outputs/train_seg_nsclc/fold1"
epochs: 160
batch_size: 1
amp: true
val_interval: 1
save_interval: 10

data:
  datalist: "${PROJECT_ROOT}/datalist/datalist_nsclc_fold1.json"
  patch_size: [96, 96, 96]
  use_lung_channel: true
  lung_key: "lung"
  hu_window: [-1000, 400]
  cache_rate: 0.0
  val_cache_rate: 0.0

model:
  name: "swin_unetr"
  in_channels: 2
  out_channels: 1
  img_size: [96, 96, 96]

optim:
  name: "adamw"
  lr: 5.0e-5
  weight_decay: 8.0e-5

val:
  roi_size: [96, 96, 96]
  sw_overlap: 0.5
  sw_batch_size: 1
  thresholds: [0.45, 0.50, 0.55, 0.60, 0.65, 0.70]
